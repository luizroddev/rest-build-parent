name: CI Build

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use (17 or 22)'
        required: false
        type: string
        default: '22'
      java-distribution:
        description: 'Java distribution (temurin, graalvm, etc.)'
        required: false
        type: string
        default: 'temurin'
      maven-args:
        description: 'Extra Maven arguments'
        required: false
        type: string
        default: ''
    secrets:
      PACKAGES_TOKEN:
        description: 'GitHub PAT with read:packages scope for resolving internal dependencies'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}
          cache: maven
          server-id: restship
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build with Maven
        run: mvn -B clean package -DskipTests ${{ inputs.maven-args }}
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.PACKAGES_TOKEN }}

      - name: Run tests
        run: mvn -B test ${{ inputs.maven-args }}
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.PACKAGES_TOKEN }}
