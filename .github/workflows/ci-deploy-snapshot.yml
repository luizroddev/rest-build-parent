name: Deploy Snapshot

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use (17 or 22)'
        required: false
        type: string
        default: '22'
      java-distribution:
        description: 'Java distribution (temurin, graalvm, etc.)'
        required: false
        type: string
        default: 'temurin'
      maven-args:
        description: 'Extra Maven arguments'
        required: false
        type: string
        default: ''
    secrets:
      PACKAGES_TOKEN:
        description: 'GitHub PAT with read:packages and write:packages scopes'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}
          cache: maven
          overwrite-settings: false

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <activeProfiles>
              <activeProfile>restship</activeProfile>
            </activeProfiles>
            <profiles>
              <profile>
                <id>restship</id>
                <repositories>
                  <repository>
                    <id>central</id>
                    <url>https://repo1.maven.org/maven2</url>
                  </repository>
                  <repository>
                    <id>restship</id>
                    <url>https://maven.pkg.github.com/romulofebasi/restship</url>
                    <snapshots>
                      <enabled>true</enabled>
                      <updatePolicy>always</updatePolicy>
                    </snapshots>
                  </repository>
                  <repository>
                    <id>restship-build</id>
                    <url>https://maven.pkg.github.com/luizroddev/rest-build-parent</url>
                    <snapshots>
                      <enabled>true</enabled>
                      <updatePolicy>always</updatePolicy>
                    </snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <servers>
              <server>
                <id>restship</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.PACKAGES_TOKEN }}</password>
              </server>
              <server>
                <id>restship-build</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.PACKAGES_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Verify SNAPSHOT version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Project version: $VERSION"
          if [[ ! "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Version '$VERSION' is not a SNAPSHOT version. Use the release workflow for non-SNAPSHOT deploys."
            exit 1
          fi

      - name: Deploy to GitHub Packages
        run: mvn -B -U clean deploy -DskipTests ${{ inputs.maven-args }}
